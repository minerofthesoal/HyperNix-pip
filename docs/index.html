<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HyperNix - End-to-end toolkit for PyTorch language models</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .card { background-color: #1e293b; border-radius: 0.5rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .stat-value { font-size: 2.25rem; font-weight: bold; color: #38bdf8; }
        .logo { max-width: 150px; height: auto; display: block; margin: 0 auto; }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-4xl flex flex-col items-center">
        <div class="text-center w-full mb-8">
            <!-- HyperNix Logo -->
            <img src="https://github.com/minerofthesoal/HyperNix-pip/raw/main/assets/logo1.png" alt="HyperNix Logo" class="logo" onerror="this.style.display='none'">
            <h1 class="text-4xl font-bold mt-4 text-white">HyperNix Statistics</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
            <div class="card text-center">
                <h3 class="text-gray-400 text-sm uppercase tracking-wide">Current Version</h3>
                <p id="version" class="stat-value text-white">Loading...</p>
            </div>
            <div class="card text-center">
                <h3 class="text-gray-400 text-sm uppercase tracking-wide">Last Day Downloads</h3>
                <p id="last_day" class="stat-value">0</p>
            </div>
            <div class="card text-center">
                <h3 class="text-gray-400 text-sm uppercase tracking-wide">Last Month Downloads</h3>
                <p id="last_month" class="stat-value">0</p>
            </div>
        </div>

        <div class="mt-8 card text-center w-full">
            <h3 class="text-gray-400 text-sm uppercase tracking-wide">Last Updated</h3>
            <p id="updated_at" class="text-gray-300 mt-2">-</p>
            <p class="text-xs text-gray-500 mt-4">Data sourced from PyPI API via local cache</p>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                // Fetch from the local v1/json.json file generated by the action
                const response = await fetch('./v1/json.json?t=' + new Date().getTime()); 
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();

                if (data.error) {
                    document.getElementById('version').innerText = "Error";
                    return;
                }

                document.getElementById('version').innerText = data.version || 'Unknown';
                document.getElementById('last_day').innerText = (data.last_day || 0).toLocaleString();
                document.getElementById('last_month').innerText = (data.last_month || 0).toLocaleString();
                document.getElementById('updated_at').innerText = new Date(data.updated_at).toLocaleString();
            } catch (error) {
                console.error('Failed to load stats:', error);
                document.getElementById('version').innerText = "Offline";
            }
        }
        loadStats();
    </script>
  </body>
</html>
