name: Update JSON Stats

# Pulls current PyPI download numbers for `hypernix`, rolls anything older
# than 30 days into a "three_month" bucket (31-90 days ago) and an "older"
# bucket (90+ days ago), and commits the refreshed docs/public/v1/json file
# back to main.
#
# This lives under docs/public/ (Vite's publicDir) specifically so that
# `npm run build` copies it into docs/dist/v1/json and it actually ships
# with the deployed site — docs/v1/json (no /public/) sits outside Vite's
# publicDir and silently never makes it into the build output.
#
# Runs automatically once a day at ~20:45 UTC, and can also be triggered
# manually from the Actions tab (workflow_dispatch) — manual runs are
# optional and never required for the schedule to keep working.

on:
  schedule:
    # 20:45 UTC every day (≈ 8:45 PM UTC)
    - cron: '45 20 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Optional note for why this run was triggered manually'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: update-json-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch PyPI stats and update docs/public/v1/json
        env:
          PYPI_PACKAGE: hypernix
          JSON_PATH: docs/public/v1/json
          MANUAL_RUN_REASON: ${{ github.event.inputs.reason }}
        run: python scripts/update_json_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/public/v1/json; then
            echo "No changes to docs/public/v1/json — skipping commit."
            exit 0
          fi
          git add docs/public/v1/json
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git commit -m "chore: update JSON stats (manual run)"
          else
            git commit -m "chore: update JSON stats (scheduled)"
          fi
          git push
